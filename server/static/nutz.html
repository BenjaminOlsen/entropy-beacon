<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENTROPY BEACON // NUTZ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Anton&family=Bebas+Neue&family=Black+Ops+One&family=Bungee+Shade&family=Creepster&family=Fascinate+Inline&family=Frijole&family=Honk&family=Kablammo&family=Lacquer&family=Monoton&family=Nabla&family=Orbitron&family=Permanent+Marker&family=Pixelify+Sans&family=Press+Start+2P&family=Rubik+Glitch&family=Rubik+Vinyl&family=Silkscreen&family=Special+Elite&family=Titan+One&family=Ultra&family=UnifrakturCook&family=Vast+Shadow&family=Zilla+Slab+Highlight&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }

  #hex-wall {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  #void {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  .word {
    position: fixed;
    left: 0; right: 0;
    text-align: center;
    line-height: 1;
    transition: none;
    white-space: nowrap;
    contain: layout style;
    will-change: font-family, color, font-size;
  }

  #latest {
    position: fixed; z-index: 5;
    bottom: 4rem; left: 0; right: 0;
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    color: #00ff88;
    letter-spacing: 0.1em;
    pointer-events: none;
    text-shadow: 0 0 10px #00ff8866;
    word-break: break-all;
    padding: 0 2rem;
  }

  #hud {
    position: fixed; z-index: 10; bottom: 1.5rem; left: 1.5rem;
    font-family: 'Courier New', monospace;
    color: #fff3; font-size: 0.7rem;
    pointer-events: none;
  }
  #hud span { color: #fff8; }

  a {
    position: fixed; z-index: 20; bottom: 1.5rem; right: 1.5rem;
    color: #fff3; font-size: 0.7rem; font-family: 'Courier New', monospace;
    text-decoration: none;
  }
  a:hover { color: #fff; }
</style>
</head>
<body>

<canvas id="hex-wall"></canvas>

<div id="void">
  <div class="word" id="w0"></div>
  <div class="word" id="w1"></div>
  <div class="word" id="w2"></div>
  <div class="word" id="w3"></div>
</div>

<div id="latest"></div>

<div id="hud">
  <span id="samples">0</span> samples
  &middot; <span id="bits">0</span> bits
  &middot; balance <span id="balance">-</span>
  &middot; p=<span id="pval">-</span>
</div>
<a href="/">&lt; back</a>

<script>
const fonts = [
  'Abril Fatface','Anton','Bebas Neue','Black Ops One','Bungee Shade',
  'Creepster','Fascinate Inline','Frijole','Honk','Kablammo','Lacquer',
  'Monoton','Nabla','Orbitron','Permanent Marker','Pixelify Sans',
  'Press Start 2P','Rubik Glitch','Rubik Vinyl','Silkscreen',
  'Special Elite','Titan One','Ultra','UnifrakturCook','Vast Shadow',
  'Zilla Slab Highlight','Impact','Georgia','Papyrus','Brush Script MT',
  'Copperplate','Didot','Futura','Luminari','Jazz LET',
];

const vocabulary = [
  'ENTROPY','BEACON','CHAOS','NOISE','RANDOM','VOID',
  'SIGNAL','FLUX','STATIC','DRIFT','PHOTON','DECAY',
  'QUANTUM','THERMAL','SCATTER','PULSE','JITTER','SEED',
  'HASH','NONCE','BLIND','ZERO','NULL','DARK',
  'SURGE','BURST','SPIKE','BLOOM','GLOW','FLASH',
  'BINARY','BYTE','OXIDE','PLASMA','FIELD','WAVE',
  'ORIGIN','SOURCE','HARVEST','RAW','PURE','TRUE',
  'ABYSS','FRACTAL','OBLIVION','LATTICE','MUON','FERMION',
  'BOSON','QUARK','LEPTON','HADRON','NEUTRINO',
  'TACHYON','BARYON','MESON','GRAVITON','PHONON','SOLITON',
  'ANNIHILATE','COLLIDE','IGNITE','DISSOLVE','SHATTER','EVAPORATE',
  'RADIATE','OSCILLATE','RESONATE','DETONATE','COLLAPSE','EMERGE',
  'INFINITE','ABSOLUTE','VOLATILE','UNSTABLE','CRITICAL','TERMINAL',
  'MOLTEN','FROZEN','ANCIENT','EXTINCT','FERAL','SPECTRAL',
  'DIODE','TRANSISTOR','CAPACITOR','RESISTOR','INDUCTOR','RELAY',
  'SILICON','GERMANIUM','GALLIUM','ARSENIC','PHOSPHOR','LITHIUM',
  'CIPHER','ORACLE','DAEMON','KERNEL','SOCKET','INTERRUPT',
  'VOLTAGE','CURRENT','IMPEDANCE','INDUCTANCE','CAPACITANCE','RESISTANCE',
  'COSMIC','STELLAR','NEBULA','PULSAR','MAGNETAR','QUASAR',
  'SINGULARITY','HORIZON','GEODESIC','MANIFOLD','TENSOR','SPINOR',
  'PHASE','EPOCH','CYCLE','PERIOD','FREQUENCY','AMPLITUDE',
  'DIFFUSE','REFRACT','ABSORB','TRANSMIT','REFLECT','EMIT',
  'SUBSTRATE','DOPANT','LATTICE','BANDGAP','VALENCE','FERMI',
  'STOCHASTIC','ERGODIC','MARKOV','POISSON','GAUSSIAN','BOLTZMANN',
  'DMT','LSD','THC','MDMA','MESCALINE','PSILOCYBIN',
  'CORTEX','SYNAPSE','DENDRITE','AXON','NEURON','RECEPTOR',
  'BLOOD','BONE','FLESH','NERVE','SKIN','SKULL',
  'DEATH','BIRTH','DREAM','WAKE','SLEEP','SCREAM',
  'NEON','CHROME','RUST','ASH','SMOKE','FIRE',
  'THUNDER','LIGHTNING','STORM','RAIN','FLOOD','DROUGHT',
  'VENOM','TOXIN','SPORE','PARASITE','VIRUS','PRION',
  'RITUAL','MANTRA','SIGIL','RUNE','GLYPH','TOTEM',
];

const els = [0,1,2,3].map(i => document.getElementById('w' + i));
const hexWallCanvas = document.getElementById('hex-wall');
const hwCtx = hexWallCanvas.getContext('2d');

function paintHexWall(hex) {
  const w = window.innerWidth;
  const h = window.innerHeight;
  hexWallCanvas.width = w;
  hexWallCanvas.height = h;
  const fontSize = Math.max(10, w * 0.011);
  const charW = fontSize * 0.6;
  const lineH = fontSize * 1.3;
  const cols = Math.floor(w / charW);
  const spaced = hex.replace(/(.{4})/g, '$1 ');

  hwCtx.clearRect(0, 0, w, h);
  hwCtx.font = `${fontSize}px 'Courier New', monospace`;
  hwCtx.fillStyle = `hsla(140, 60%, 45%, 0.07)`;

  let x = 4, y = lineH;
  for (let i = 0; i < spaced.length && y < h + lineH; i++) {
    hwCtx.fillText(spaced[i], x, y);
    x += charW;
    if (x > w - charW) { x = 4; y += lineH; }
  }
}
const aligns = ['left','center','right'];
const txforms = ['uppercase','lowercase','capitalize','none'];
const decos = ['none','underline','line-through','overline'];

let entropyHex = '';
let lastSamples = 0;
let frameCount = 0;
let bgFlash = 0;

// words[i] only changes on new data
let words = ['ENTROPY','BEACON','CHAOS','VOID'];

// Use a simple fast RNG seeded by entropy bytes for per-frame randomness
// This decouples animation speed from data arrival
let rngState = Date.now() | 1;
function fastRng() {
  rngState ^= rngState << 13;
  rngState ^= rngState >> 17;
  rngState ^= rngState << 5;
  return (rngState >>> 0) % 256;
}

function tick() {
  frameCount++;

  // reseed rng from entropy periodically so it's influenced by real data
  if (frameCount % 60 === 0 && entropyHex.length >= 8) {
    const off = (frameCount * 2) % (entropyHex.length - 8);
    rngState = parseInt(entropyHex.substr(off, 8), 16) | 1;
  }

  // background flash on new data
  if (bgFlash > 0) {
    const l = Math.min(bgFlash * 100, 100);
    document.body.style.background = `hsl(${fastRng() / 255 * 360}, 100%, ${l}%)`;
    bgFlash *= 0.82;
    if (bgFlash < 0.01) { bgFlash = 0; document.body.style.background = '#000'; }
  }

  // strobe — random black frames
  const blackFrame = fastRng() % 6 === 0;

  for (let i = 0; i < els.length; i++) {
    if (blackFrame) {
      els[i].style.opacity = '0';
      continue;
    }
    els[i].style.opacity = '1';

    // DESIGN changes every frame (font, color, size, etc) — position stays fixed
    const font = fonts[fastRng() % fonts.length];
    const baseSize = Math.min(window.innerWidth / 8, window.innerHeight / 8);
    const size = baseSize * (0.8 + (fastRng() / 255) * 0.4);
    const hue = (fastRng() / 255) * 360;
    const sat = 60 + (fastRng() / 255) * 40;
    const lum = 40 + (fastRng() / 255) * 40;
    const spacing = (fastRng() / 255 - 0.3) * 0.6;
    const txform = txforms[fastRng() % 4];
    const deco = decos[fastRng() % 4];
    const style = fastRng();

    // fixed vertical positions: 20%, 38%, 56%, 74%
    const yPct = 20 + i * 18;

    // TEXT stays the same until new data arrives
    els[i].textContent = words[i];
    els[i].style.fontFamily = `'${font}', sans-serif`;
    els[i].style.fontSize = size + 'px';
    els[i].style.letterSpacing = spacing + 'em';
    els[i].style.top = yPct + '%';
    els[i].style.transform = 'translateY(-50%)';
    els[i].style.textTransform = txform;
    els[i].style.textDecoration = deco;

    if (style % 11 === 0) {
      // inverted block
      els[i].style.color = '#000';
      els[i].style.webkitTextStroke = '';
      els[i].style.textShadow = 'none';
      els[i].style.background = `hsl(${hue}, ${sat}%, ${lum}%)`;
      els[i].style.padding = '0 0.3em';
    } else if (style % 13 === 0) {
      // outline only
      els[i].style.color = 'transparent';
      els[i].style.webkitTextStroke = `2px hsl(${hue}, ${sat}%, ${lum}%)`;
      els[i].style.textShadow = 'none';
      els[i].style.background = 'transparent';
      els[i].style.padding = '0';
    } else {
      // normal glow
      els[i].style.color = `hsl(${hue}, ${sat}%, ${lum}%)`;
      els[i].style.webkitTextStroke = '';
      els[i].style.textShadow = `0 0 ${10 + style % 40}px hsl(${hue}, 100%, 50%), 0 0 ${40 + style % 80}px hsl(${hue}, 100%, 40%)`;
      els[i].style.background = 'transparent';
      els[i].style.padding = '0';
    }
  }

}

// --- DATA ---
const HEX_WALL_LIMIT = 4000; // characters

async function poll() {
  try {
    // lightweight stats poll
    const r = await fetch('/api/quality');
    const d = await r.json();
    if (!d.samples) { return; }

    document.getElementById('samples').textContent = d.samples;
    document.getElementById('bits').textContent = d.total_bits.toLocaleString();
    document.getElementById('balance').textContent = d.ones_pct.toFixed(2) + '%';
    document.getElementById('pval').textContent = d.chi_squared_pvalue;

    if (d.samples > lastSamples) {
      bgFlash = 1;

      // fetch raw for latest values only
      const fetchFrom = Math.max(1, (d.max_id || 1) - 100);
      const rr = await fetch(`/api/quality/raw?from=${fetchFrom}`);
      const rd = await rr.json();
      if (rd.raw) {
        entropyHex = rd.raw;

        const tail = entropyHex.slice(-32);
        for (let i = 0; i < 4; i++) {
          const b = parseInt(tail.substr(i * 4, 2) || '00', 16);
          if (b % 5 === 0) {
            const off = (b * 7) % Math.max(1, entropyHex.length - 20);
            words[i] = entropyHex.substring(off, off + 8 + (b % 16));
          } else {
            words[i] = vocabulary[b % vocabulary.length];
          }
        }

        document.getElementById('latest').textContent = entropyHex.slice(-64);
        paintHexWall(entropyHex.slice(-HEX_WALL_LIMIT));
      }

      lastSamples = d.samples;
    }
  } catch(e) {}
}

poll();
setInterval(poll, 1000);

let lastTick = 0;
function loop(now) {
  if (now - lastTick >= 300) {
    lastTick = now;
    tick();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
