<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entropy Quality</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0; padding: 2rem; max-width: 900px; margin: 0 auto; }
  h1 { color: #00ff88; margin-bottom: 0.5rem; font-size: 1.4rem; }
  a { color: #00ff88; }
  .nav { margin-bottom: 1.5rem; font-size: 0.85rem; }
  .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
  .panel h2 { color: #888; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.75rem; }
  .stat { display: flex; justify-content: space-between; padding: 0.25rem 0; }
  .stat .label { color: #888; }
  .stat .value { color: #00ff88; }
  .stat .value.warn { color: #ffaa00; }
  .stat .value.bad { color: #ff4444; }
  canvas { display: block; image-rendering: pixelated; }
  #bitmap-canvas { border: 1px solid #333; width: 100%; }
  #histo-canvas { width: 100%; height: 200px; }
  .empty { color: #666; text-align: center; padding: 2rem; }
  .dual-range { position: relative; height: 2rem; margin: 0.5rem 0; }
  .dual-range input[type=range] {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    -webkit-appearance: none; appearance: none; background: none; pointer-events: none; z-index: 1;
  }
  .dual-range input[type=range]#from-slider { z-index: 2; }
  .dual-range input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #00ff88; border: 2px solid #0a0a0a;
    pointer-events: auto; cursor: pointer;
    position: relative; z-index: 2;
  }
  .dual-range input[type=range]::-webkit-slider-runnable-track {
    height: 4px; background: transparent; border-radius: 2px;
  }
  .dual-range input[type=range]#to-slider::-webkit-slider-runnable-track {
    background: #333;
  }
  .dual-range input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: #00ff88; border: 2px solid #0a0a0a;
    pointer-events: auto; cursor: pointer;
  }
  .dual-range input[type=range]::-moz-range-track {
    height: 4px; background: transparent; border-radius: 2px;
  }
  .dual-range input[type=range]#to-slider::-moz-range-track {
    background: #333;
  }
  .range-labels { display: flex; justify-content: space-between; color: #888; font-size: 0.75rem; }
  #range-info { color: #666; font-size: 0.75rem; margin-top: 0.25rem; text-align: center; }
</style>
</head>
<body>
<h1>&gt; entropy quality</h1>
<div class="nav"><a href="/">&lt; dashboard</a> · <a href="/nutz.html">nutz mode</a></div>

<div class="panel">
  <h2>Range</h2>
  <div class="dual-range">
    <input type="range" id="from-slider" min="1" max="1" value="1">
    <input type="range" id="to-slider" min="1" max="1" value="1">
  </div>
  <div class="range-labels"><span id="from-label">1</span><span id="to-label">1</span></div>
  <div id="range-info">-</div>
</div>

<div class="panel">
  <h2>Statistics</h2>
  <div id="stats" class="empty">Loading...</div>
</div>

<div class="panel">
  <h2>Bit Bitmap</h2>
  <canvas id="bitmap-canvas"></canvas>
</div>

<div class="panel">
  <h2>Byte Frequency Histogram</h2>
  <canvas id="histo-canvas"></canvas>
  <div style="display:flex;justify-content:space-between;color:#444;font-size:0.7rem;margin-top:0.25rem;"><span>0</span><span id="histo-n"></span><span>255</span></div>
</div>

<script>
const fromSlider = document.getElementById('from-slider');
const toSlider = document.getElementById('to-slider');
let globalMinID = 0, globalMaxID = 0;
let lastMaxID = 0;
let sliderTouched = false;

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
  }
  return bytes;
}

function computeStats(raw) {
  const n = raw.length;
  let onesCount = 0;
  for (let i = 0; i < n; i++) {
    let b = raw[i];
    b = b - ((b >> 1) & 0x55);
    b = (b & 0x33) + ((b >> 2) & 0x33);
    onesCount += (b + (b >> 4)) & 0x0f;
  }

  const totalBits = n * 8;
  const onesPct = totalBits ? (onesCount / totalBits) * 100 : 50;

  const freq = new Array(256).fill(0);
  for (let i = 0; i < n; i++) {
    freq[raw[i]]++;
  }

  const expected = n / 256;
  let chiSq = 0;
  for (let i = 0; i < 256; i++) {
    const diff = freq[i] - expected;
    chiSq += (diff * diff) / expected;
  }

  const df = 255;
  const zz = Math.pow(chiSq / df, 1/3) - (1 - 2 / (9 * df));
  const z = zz / Math.sqrt(2 / (9 * df));
  const pValue = 0.5 * (1 - erf(z / Math.SQRT2));

  let sumXY = 0, sumX = 0, sumY = 0, sumX2 = 0, sumY2 = 0;
  for (let i = 0; i < n - 1; i++) {
    const x = raw[i], y = raw[i + 1];
    sumXY += x * y;
    sumX += x;
    sumY += y;
    sumX2 += x * x;
    sumY2 += y * y;
  }
  const nf = n - 1;
  let corr = 0;
  const denom = Math.sqrt((nf * sumX2 - sumX * sumX) * (nf * sumY2 - sumY * sumY));
  if (denom > 0) {
    corr = (nf * sumXY - sumX * sumY) / denom;
  }

  return { totalBits, onesCount, onesPct, freq, chiSq, pValue, corr, samples: Math.floor(n / 32) };
}

// Approximation of error function
function erf(x) {
  const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741, a4 = -1.453152027, a5 = 1.061405429;
  const p = 0.3275911;
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  const t = 1 / (1 + p * x);
  const y = 1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
  return sign * y;
}

function renderStats(s) {
  const biasClass = Math.abs(s.onesPct - 50) < 1 ? '' : Math.abs(s.onesPct - 50) < 2 ? 'warn' : 'bad';
  const corrAbs = Math.abs(s.corr);
  const corrClass = corrAbs < 0.01 ? '' : corrAbs < 0.05 ? 'warn' : 'bad';
  const chiRound = Math.round(s.chiSq * 100) / 100;
  const pRound = Math.round(s.pValue * 10000) / 10000;
  const corrRound = Math.round(s.corr * 10000) / 10000;
  const pClass = pRound > 0.01 ? '' : pRound > 0.001 ? 'warn' : 'bad';

  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="label">Samples</span><span class="value">${s.samples} (${s.totalBits} bits)</span></div>
    <div class="stat"><span class="label">Bit balance</span><span class="value ${biasClass}">${s.onesPct.toFixed(3)}%</span></div>
    <div class="stat"><span class="label">Chi-squared (byte)</span><span class="value ${pClass}">${chiRound} (p=${pRound})</span></div>
    <div class="stat"><span class="label">Serial correlation</span><span class="value ${corrClass}">${corrRound}</span></div>
  `;
}

function renderBitmap(raw) {
  const totalBits = raw.length * 8;
  const bmpCanvas = document.getElementById('bitmap-canvas');
  const panelWidth = bmpCanvas.parentElement.clientWidth - 32;
  const pixelScale = 2;
  const width = Math.floor(panelWidth / pixelScale);
  const height = Math.ceil(totalBits / width);
  bmpCanvas.width = width;
  bmpCanvas.height = height;
  bmpCanvas.style.width = (width * pixelScale) + 'px';
  bmpCanvas.style.height = (height * pixelScale) + 'px';
  const ctx = bmpCanvas.getContext('2d');
  const img = ctx.createImageData(width, height);

  let bitIdx = 0;
  for (let i = 0; i < raw.length && bitIdx < width * height; i++) {
    for (let b = 7; b >= 0 && bitIdx < width * height; b--, bitIdx++) {
      const on = (raw[i] >> b) & 1;
      const px = bitIdx * 4;
      img.data[px] = img.data[px+1] = img.data[px+2] = on ? 255 : 0;
      img.data[px+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function renderHistogram(freq, nBytes) {
  document.getElementById('histo-n').textContent = 'N = ' + Math.floor(nBytes / 32);
  const hCanvas = document.getElementById('histo-canvas');
  const dpr = window.devicePixelRatio || 1;
  const hRect = hCanvas.getBoundingClientRect();
  hCanvas.width = hRect.width * dpr;
  hCanvas.height = 200 * dpr;
  hCanvas.style.height = '200px';
  const hCtx = hCanvas.getContext('2d');
  hCtx.scale(dpr, dpr);
  const w = hRect.width;
  const h = 200;

  const maxFreq = Math.max(...freq);
  if (maxFreq === 0) { return; }
  const expected = nBytes / 256;
  const barW = w / 256;

  const ey = h - (expected / maxFreq) * (h - 10);
  hCtx.strokeStyle = '#ff4444';
  hCtx.lineWidth = 1;
  hCtx.setLineDash([4, 4]);
  hCtx.beginPath();
  hCtx.moveTo(0, ey);
  hCtx.lineTo(w, ey);
  hCtx.stroke();
  hCtx.setLineDash([]);

  for (let i = 0; i < 256; i++) {
    const barH = (freq[i] / maxFreq) * (h - 10);
    hCtx.fillStyle = '#00ff88';
    hCtx.fillRect(i * barW, h - barH, Math.max(barW - 0.5, 1), barH);
  }
}

async function fetchAndRender() {
  const from = parseInt(fromSlider.value);
  const to = parseInt(toSlider.value);
  document.getElementById('from-label').textContent = from;
  document.getElementById('to-label').textContent = to;
  document.getElementById('range-info').textContent = `samples ${from} - ${to} (${to - from + 1} selected)`;

  if (from > to) {
    document.getElementById('stats').textContent = 'Invalid range.';
    return;
  }

  try {
    const r = await fetch(`/api/quality/raw?from=${from}&to=${to}`);
    const d = await r.json();

    if (!d.samples || !d.raw) {
      document.getElementById('stats').textContent = 'No data in range.';
      return;
    }

    const raw = hexToBytes(d.raw);
    const stats = computeStats(raw);
    renderStats(stats);
    renderBitmap(raw);
    renderHistogram(stats.freq, raw.length);
  } catch (e) {
    document.getElementById('stats').textContent = 'Error loading data.';
  }
}

// Update slider bounds from /api/quality (lightweight poll)
async function pollBounds() {
  try {
    const r = await fetch('/api/quality');
    const d = await r.json();
    if (!d.samples || !d.min_id) { return; }

    globalMinID = d.min_id;
    globalMaxID = d.max_id;

    fromSlider.min = globalMinID;
    fromSlider.max = globalMaxID;
    toSlider.min = globalMinID;
    toSlider.max = globalMaxID;

    // Auto-extend to show all data if user hasn't touched the slider
    if (!sliderTouched || lastMaxID === 0) {
      fromSlider.value = globalMinID;
      toSlider.value = globalMaxID;
    } else if (parseInt(toSlider.value) === lastMaxID) {
      // Slider was at the end — keep it pinned to the latest
      toSlider.value = globalMaxID;
    }

    if (globalMaxID !== lastMaxID) {
      lastMaxID = globalMaxID;
      fetchAndRender();
    }
  } catch (e) { /* ignore */ }
}

fromSlider.addEventListener('input', () => {
  sliderTouched = true;
  if (parseInt(fromSlider.value) > parseInt(toSlider.value)) {
    toSlider.value = fromSlider.value;
  }
  fetchAndRender();
});

toSlider.addEventListener('input', () => {
  sliderTouched = true;
  if (parseInt(toSlider.value) < parseInt(fromSlider.value)) {
    fromSlider.value = toSlider.value;
  }
  fetchAndRender();
});

pollBounds();
setInterval(pollBounds, 2000);
</script>
</body>
</html>
