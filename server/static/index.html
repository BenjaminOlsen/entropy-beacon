<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entropy Beacon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0; padding: 2rem; max-width: 700px; margin: 0 auto; }
  h1 { color: #00ff88; margin-bottom: 0.5rem; font-size: 1.4rem; }
  .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }
  a { color: #00ff88; }
  .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
  .panel h2 { color: #888; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.75rem; }
  .beacon-list { list-style: none; }
  .beacon-list li { padding: 0.75rem 0; border-bottom: 1px solid #222; }
  .beacon-list li:last-child { border-bottom: none; }
  .beacon-id { font-size: 1rem; font-weight: bold; }
  .beacon-name { color: #888; margin-left: 0.5rem; font-size: 0.85rem; }
  .beacon-meta { color: #666; font-size: 0.8rem; margin-top: 0.25rem; }
  .empty { color: #666; text-align: center; padding: 2rem; }
</style>
</head>
<body>
<h1>&gt; entropy beacon</h1>
<div class="subtitle">hardware entropy collection network</div>

<div class="panel">
  <h2>Beacons</h2>
  <div id="beacons" class="empty">Loading...</div>
</div>

<script>
async function loadBeacons() {
  try {
    const r = await fetch('/api/beacons');
    const beacons = await r.json();

    if (!beacons || beacons.length === 0) {
      document.getElementById('beacons').innerHTML = '<div class="empty">No beacons registered yet.</div>';
      return;
    }

    const ul = document.createElement('ul');
    ul.className = 'beacon-list';
    for (const b of beacons) {
      const li = document.createElement('li');
      const nameSpan = b.name ? '<span class="beacon-name">' + b.name + '</span>' : '';
      const lastRecv = b.last_received ? new Date(b.last_received + 'Z').toLocaleString() : 'never';
      li.innerHTML = '<a class="beacon-id" href="/beacon.html?id=' + encodeURIComponent(b.id) + '">' + b.id + '</a>'
        + nameSpan
        + '<div class="beacon-meta">' + b.samples + ' samples &middot; last received ' + lastRecv + '</div>';
      ul.appendChild(li);
    }
    document.getElementById('beacons').replaceWith(ul);
  } catch (e) {
    document.getElementById('beacons').textContent = 'Error loading beacons.';
  }
}

loadBeacons();
setInterval(loadBeacons, 5000);
</script>
</body>
</html>
